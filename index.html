<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2d3436">
    <title>English Pro App</title>
    <style>
        :root { --primary: #0984e3; --secondary: #74b9ff; --bg: #f5f6fa; --card: #ffffff; --text: #2d3436; --success: #00b894; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; -webkit-tap-highlight-color: transparent; }
        .app-container { width: 100%; max-width: 480px; background-color: var(--card); min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); position: relative; overflow-x: hidden; }
        .header { background: var(--primary); color: white; padding: 25px 20px; text-align: center; font-size: 22px; font-weight: bold; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; box-shadow: 0 4px 6px rgba(9, 132, 227, 0.2); }
        
        /* Navigation */
        .screen { display: none; padding: 20px; animation: fadeIn 0.3s ease-in-out; padding-bottom: 80px; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Cards */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .menu-card { background: var(--card); border: 2px solid #dfe6e9; border-radius: 15px; padding: 20px 10px; text-align: center; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .menu-card:active { transform: scale(0.95); border-color: var(--primary); }
        .menu-icon { font-size: 35px; margin-bottom: 10px; }
        .menu-title { color: var(--text); font-size: 15px; font-weight: bold; }

        /* Content Lists */
        .list-item { background: #f1f2f6; border-radius: 12px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .word-en { font-weight: bold; color: var(--primary); font-size: 18px; margin-bottom: 4px; }
        .word-es { color: #636e72; font-size: 14px; }
        .play-btn { background: var(--primary); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; }
        
        /* Tables (Verbs) */
        .verb-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        .verb-table th { background: var(--secondary); color: white; padding: 10px; text-align: left; }
        .verb-table td { padding: 10px; border-bottom: 1px solid #dfe6e9; }
        .verb-es { display: block; font-size: 11px; color: #636e72; }

        /* Speaking Lab */
        .speak-container { text-align: center; margin-top: 30px; }
        .target-word { font-size: 32px; font-weight: bold; color: var(--primary); margin: 20px 0; padding: 20px; background: #f1f2f6; border-radius: 15px; }
        .mic-btn { background: var(--primary); color: white; border: none; width: 80px; height: 80px; border-radius: 50%; font-size: 35px; cursor: pointer; box-shadow: 0 4px 10px rgba(9, 132, 227, 0.4); transition: 0.2s; }
        .mic-btn:active { transform: scale(0.9); }
        .mic-btn.listening { background: #ff7675; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 118, 117, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 118, 117, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 118, 117, 0); } }
        .speak-status { margin-top: 20px; font-size: 16px; color: #636e72; min-height: 40px; }

        .back-btn { background: transparent; border: none; color: var(--text); font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; margin-bottom: 20px; padding: 0; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header" id="app-header">English Pro App</div>

        <div id="home" class="screen active">
            <h3 style="color: var(--text); margin-top: 0;">Selecciona una categoría:</h3>
            <div class="menu-grid">
                <div class="menu-card" onclick="nav('vocab', 'Vocabulario')">
                    <div class="menu-icon">💅</div><div class="menu-title">Vocabulario</div>
                </div>
                <div class="menu-card" onclick="nav('verbs', 'Verbos')">
                    <div class="menu-icon">🔄</div><div class="menu-title">Verbos (3 Tiempos)</div>
                </div>
                <div class="menu-card" onclick="nav('numbers', 'Números')">
                    <div class="menu-icon">🔢</div><div class="menu-title">Números</div>
                </div>
                <div class="menu-card" onclick="nav('abc', 'Abecedario')">
                    <div class="menu-icon">🔤</div><div class="menu-title">Abecedario</div>
                </div>
                <div class="menu-card" onclick="nav('phrasal', 'Phrasal Verbs')">
                    <div class="menu-icon">🧩</div><div class="menu-title">Phrasal Verbs</div>
                </div>
                <div class="menu-card" style="border-color: var(--success);" onclick="startSpeakingLab()">
                    <div class="menu-icon">🎙️</div><div class="menu-title">Práctica de Voz</div>
                </div>
            </div>
        </div>

        <div id="vocab" class="screen"><button class="back-btn" onclick="nav('home')">‹ Volver al menú</button><div id="content-vocab"></div></div>
        <div id="numbers" class="screen"><button class="back-btn" onclick="nav('home')">‹ Volver al menú</button><div id="content-numbers"></div></div>
        <div id="abc" class="screen"><button class="back-btn" onclick="nav('home')">‹ Volver al menú</button><div id="content-abc"></div></div>
        <div id="phrasal" class="screen"><button class="back-btn" onclick="nav('home')">‹ Volver al menú</button><div id="content-phrasal"></div></div>
        
        <div id="verbs" class="screen">
            <button class="back-btn" onclick="nav('home')">‹ Volver al menú</button>
            <table class="verb-table">
                <thead><tr><th>Presente</th><th>Pasado</th><th>Participio</th></tr></thead>
                <tbody id="content-verbs"></tbody>
            </table>
        </div>

        <div id="speaking" class="screen">
            <button class="back-btn" onclick="nav('home')">‹ Terminar Práctica</button>
            <div class="speak-container">
                <h3>Lee en voz alta para avanzar:</h3>
                <div id="target-word" class="target-word">Cargando...</div>
                <button id="mic-btn" class="mic-btn" onclick="listen()">🎤</button>
                <div id="speak-status" class="speak-status">Toca el micrófono para hablar</div>
            </div>
        </div>

    </div>

    <script>
        // BASE DE DATOS
        const db = {
            vocab: [
                {en: "Appointment", es: "Cita"}, {en: "Customer", es: "Cliente"},
                {en: "Nail polish", es: "Esmalte de uñas"}, {en: "Acrylics", es: "Acrílicas"},
                {en: "Cuticle scissors", es: "Tijeras de cutícula"}, {en: "Acetone", es: "Acetona"},
                {en: "Top coat", es: "Brillo final / Sellador"}, {en: "Base coat", es: "Base protectora"}
            ],
            numbers: [
                {en: "One", es: "1"}, {en: "Two", es: "2"}, {en: "Three", es: "3"},
                {en: "Four", es: "4"}, {en: "Five", es: "5"}, {en: "Ten", es: "10"},
                {en: "Fifteen", es: "15"}, {en: "Twenty", es: "20"}, {en: "Thirty", es: "30"},
                {en: "Forty", es: "40"}, {en: "Fifty", es: "50"}, {en: "One hundred", es: "100"}
            ],
            abc: [
                {en: "A", es: "Pronunciación: /ei/"}, {en: "B", es: "Pronunciación: /bi/"},
                {en: "C", es: "Pronunciación: /si/"}, {en: "E", es: "Pronunciación: /i/"},
                {en: "I", es: "Pronunciación: /ai/"}, {en: "H", es: "Pronunciación: /eich/"},
                {en: "R", es: "Pronunciación: /ar/"}, {en: "W", es: "Pronunciación: /dabol-iu/"}
            ],
            phrasal: [
                {en: "Sit down", es: "Sentarse"}, {en: "Take off", es: "Quitarse (ej. joyas, zapatos)"},
                {en: "Clean up", es: "Limpiar / Recoger"}, {en: "Set up", es: "Preparar (estación de trabajo)"},
                {en: "Dry off", es: "Secar"}
            ],
            verbs: [
                {p: "Be", p_es: "Ser/Estar", past: "Was/Were", part: "Been"},
                {p: "Do", p_es: "Hacer", past: "Did", part: "Done"},
                {p: "Have", p_es: "Tener", past: "Had", part: "Had"},
                {p: "Go", p_es: "Ir", past: "Went", part: "Gone"},
                {p: "Say", p_es: "Decir", past: "Said", part: "Said"},
                {p: "Make", p_es: "Hacer/Crear", past: "Made", part: "Made"},
                {p: "Take", p_es: "Tomar/Llevar", past: "Took", part: "Taken"},
                {p: "Cut", p_es: "Cortar", past: "Cut", part: "Cut"}
            ],
            speakingWords: [
                "Hello", "Thank you", "Sit down", "Nail polish", "Acrylic", "Perfect", "Clean up"
            ]
        };

        // RENDERIZADO DE LISTAS
        function renderLists() {
            ['vocab', 'numbers', 'abc', 'phrasal'].forEach(cat => {
                const container = document.getElementById('content-' + cat);
                container.innerHTML = '';
                db[cat].forEach(item => {
                    container.innerHTML += `
                        <div class="list-item">
                            <div><div class="word-en">${item.en}</div><div class="word-es">${item.es}</div></div>
                            <button class="play-btn" onclick="speak('${item.en}')">🔊</button>
                        </div>`;
                });
            });

            const verbsContainer = document.getElementById('content-verbs');
            db.verbs.forEach(v => {
                verbsContainer.innerHTML += `
                    <tr>
                        <td><b>${v.p}</b><span class="verb-es">${v.p_es}</span></td>
                        <td>${v.past}</td>
                        <td>${v.part}</td>
                    </tr>`;
            });
        }

        // NAVEGACIÓN
        function nav(target, title = 'English Pro App') {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(target).classList.add('active');
            document.getElementById('app-header').innerText = title;
            window.scrollTo(0, 0);
            if(window.speechSynthesis) window.speechSynthesis.cancel();
        }

        // TEXTO A VOZ
        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85;
                window.speechSynthesis.speak(utterance);
            }
        }

        // MOTOR DE RECONOCIMIENTO DE VOZ
        let currentWordIndex = 0;
        
        function startSpeakingLab() {
            nav('speaking', 'Práctica de Voz');
            currentWordIndex = 0;
            loadNextWord();
        }

        function loadNextWord() {
            if (currentWordIndex >= db.speakingWords.length) {
                document.getElementById('target-word').innerText = "¡Excelente!";
                document.getElementById('speak-status').innerText = "Has completado la práctica.";
                document.getElementById('mic-btn').style.display = 'none';
                return;
            }
            document.getElementById('mic-btn').style.display = 'inline-block';
            document.getElementById('target-word').innerText = db.speakingWords[currentWordIndex];
            document.getElementById('speak-status').innerText = "Toca el micrófono para hablar";
        }

        function listen() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Tu navegador no soporta esta función. Por favor, usa Google Chrome.");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;
            
            const micBtn = document.getElementById('mic-btn');
            const status = document.getElementById('speak-status');
            const target = db.speakingWords[currentWordIndex].toLowerCase();

            recognition.onstart = function() {
                micBtn.classList.add('listening');
                status.innerText = "Escuchando... (Habla ahora)";
            };

            recognition.onresult = function(event) {
                micBtn.classList.remove('listening');
                let transcript = event.results[0][0].transcript.toLowerCase().replace(/[.,!?]/g, '').trim();
                
                if (transcript.includes(target) || target.includes(transcript)) {
                    status.innerHTML = `<span style="color:var(--success); font-weight:bold;">¡Perfecto! Escuché: "${transcript}"</span>`;
                    currentWordIndex++;
                    setTimeout(loadNextWord, 2000);
                } else {
                    status.innerHTML = `<span style="color:#ff7675;">Casi. Escuché: "${transcript}". Intenta de nuevo.</span>`;
                }
            };

            recognition.onerror = function(event) {
                micBtn.classList.remove('listening');
                status.innerText = "No pude escucharte bien. Toca e intenta de nuevo.";
            };

            recognition.onend = function() {
                micBtn.classList.remove('listening');
            };

            recognition.start();
        }

        // INICIALIZAR
        renderLists();
    </script>
</body>
</html>
